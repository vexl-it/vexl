name: "[Build] APK"
run-name: "Build APK (${{ inputs.environment }}) on ${{ github.sha }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
  workflow_call:
    inputs:
      environment:
        description: "Environment to build"
        required: true
        type: string

jobs:
  build:
    name: Build APK and upload artifact
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @vexl-next/mobile-app...
      - name: Resolve APK build profile
        id: profile
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "name=productionApk" >> "$GITHUB_OUTPUT"
          else
            echo "name=stagingApk" >> "$GITHUB_OUTPUT"
          fi
      - name: Build on EAS and download APK
        run: |
          eas build --platform android --profile ${{ steps.profile.outputs.name }} --non-interactive --wait --json > build.json
          APK_URL="$(jq -r 'if type == "array" then .[0].artifacts.buildUrl else .artifacts.buildUrl end' build.json)"
          test "$APK_URL" != "null"
          curl -L "$APK_URL" -o vexl-${{ inputs.environment }}.apk
        working-directory: apps/mobile
      - name: Upload signed APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vexl-${{ inputs.environment }}-signed-apk
          path: apps/mobile/vexl-${{ inputs.environment }}.apk
