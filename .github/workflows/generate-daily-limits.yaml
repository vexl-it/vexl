name: "[Generate] Generate daily limits"
run-name: "Run on commit ${{github.sha}}"

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Output format"
        required: true
        type: choice
        options:
          - json
          - csv

jobs:
  build:
    name: Generate daily limits
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @vexl-next/generate-api-call-limits...

      - name: Validate env input
        id: validate-env
        shell: bash
        env:
          TARGET_ENV: ${{ github.event.inputs.env }}
        run: |
          case "$TARGET_ENV" in
            json|csv) ;;
            *)
              echo "Invalid env input: $TARGET_ENV" >&2
              exit 1
              ;;
          esac
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Run export
        shell: bash
        env:
          TARGET_ENV: ${{ steps.validate-env.outputs.target_env }}
        run: pnpm --filter @vexl-next/generate-api-call-limits print-api-call-limits --output="$TARGET_ENV" > "daily-limits.$TARGET_ENV"

      - name: Upload daily limits file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: daily-limits-${{ steps.validate-env.outputs.target_env }}
          path: daily-limits.${{ steps.validate-env.outputs.target_env }}
          retention-days: 30
