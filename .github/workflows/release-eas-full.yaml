name: "[Release] Full app (stores + APK)"
run-name: "Full app release ${{ inputs.app_version }} on ${{ github.sha }}${{ inputs.skip_production && ' (staging only)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      skip_production:
        description: "Skip production (release to staging only)"
        required: false
        type: boolean
        default: false
      app_version:
        description: "App version in the format 1.2.3 (520); must match apps/mobile/app.config.ts"
        required: true
        type: string

jobs:
  # ---- Staging ----
  staging-store:
    uses: ./.github/workflows/release-eas-store.yaml
    secrets: inherit
    with:
      environment: staging
      platform: all
      app_version: ${{ inputs.app_version }}

  staging-apk:
    uses: ./.github/workflows/build-eas-apk.yaml
    secrets: inherit
    with:
      environment: staging
      app_version: ${{ inputs.app_version }}

  # ---- Production (skipped when skip_production is checked) ----
  production-store:
    if: ${{ !inputs.skip_production }}
    uses: ./.github/workflows/release-eas-store.yaml
    secrets: inherit
    with:
      environment: production
      platform: all
      app_version: ${{ inputs.app_version }}

  production-apk:
    if: ${{ !inputs.skip_production }}
    uses: ./.github/workflows/build-eas-apk.yaml
    secrets: inherit
    with:
      environment: production
      app_version: ${{ inputs.app_version }}
