name: "[Release] Over-the-air update (last resort)"
run-name: "⚠️ OTA update (${{ inputs.environment }}) by @${{ github.actor }}: ${{ inputs.reason }}"

# LAST RESORT. We release normal updates through the stores — use this only
# when a JS-only hotfix cannot wait for a store release.
#
# Guard rails built in:
# - a written reason is required and becomes part of the published update's
#   message (permanent audit trail on the EAS dashboard)
# - releasing to production requires typing an exact confirmation phrase
# - the job runs in a GitHub environment (ota-staging / ota-production);
#   add required reviewers to those environments in repo settings to gate
#   production OTA behind an approval step
#
# Reach: with the fingerprint runtime policy, the update only lands on
# binaries whose native code matches this commit exactly. If native code
# changed since the store release, the update silently reaches nobody —
# check the runtime shown in the job summary against the fleet's runtime
# on the EAS dashboard before assuming the fix is out.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to publish the OTA update to"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      reason:
        description: "Why is this going out over the air instead of through the stores?"
        required: true
        type: string
      confirm_production:
        description: "To release to production, type: release-ota-to-production"
        required: false
        type: string

concurrency:
  group: ota-update-${{ inputs.environment }}

jobs:
  publish:
    name: Publish OTA update (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ota-${{ inputs.environment }}
    permissions:
      contents: read
    env:
      ENV_PRESET: ${{ inputs.environment == 'production' && 'prod' || 'stage' }}
      EAS_BUILD_GIT_COMMIT_HASH: ${{ github.sha }}
      REASON: ${{ inputs.reason }}
    steps:
      - name: Require typed confirmation for production
        if: inputs.environment == 'production'
        env:
          CONFIRMATION: ${{ inputs.confirm_production }}
        run: |
          if [ "$CONFIRMATION" != "release-ota-to-production" ]; then
            echo "::error::Production OTA not confirmed. Re-run and type 'release-ota-to-production' into the confirmation field. Remember: store releases are the preferred way to ship updates."
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @vexl-next/mobile-app...
      - name: Publish update to both channels
        # Store builds and APK builds listen on separate channels
        # (<env> and <env>-apk), so publish to both. IS_DEV_CLIENT_BUILD must
        # NOT be set here — that flag shifts the fingerprint to the
        # dev-client runtime and the update would target dev clients instead
        # of release apps.
        run: |
          {
            echo "## ⚠️ OTA update (${{ inputs.environment }})"
            echo ""
            echo "- Actor: @${{ github.actor }}"
            echo "- Reason: ${REASON}"
            echo "- Commit: ${{ github.sha }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          for CHANNEL in "${{ inputs.environment }}" "${{ inputs.environment }}-apk"; do
            eas update --channel "$CHANNEL" --message "OTA (${REASON}) @ ${GITHUB_SHA::7}" --non-interactive --json > update.json
            jq -r --arg channel "$CHANNEL" \
              '(if type == "array" then . else [.] end)[] |
               "- channel `\($channel)` / \(.platform) / runtime `\(.runtimeVersion)` → [update group](https://expo.dev/accounts/vexlit/projects/vexl/updates/\(.group))"' \
              update.json >> "$GITHUB_STEP_SUMMARY"
          done
          {
            echo ""
            echo "**Verify reach:** the update only lands on binaries whose runtime matches the values above. Compare against the latest store build's runtime on the [EAS dashboard](https://expo.dev/accounts/vexlit/projects/vexl)."
          } >> "$GITHUB_STEP_SUMMARY"
        working-directory: apps/mobile
      - name: Upload sourcemaps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN secret is not set — crashes from this OTA bundle will be unsymbolicated in Sentry."
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ Sourcemaps NOT uploaded to Sentry (missing SENTRY_AUTH_TOKEN secret)." >> "$GITHUB_STEP_SUMMARY"
          else
            pnpm exec sentry-expo-upload-sourcemaps dist
          fi
        working-directory: apps/mobile
