name: "[Test] run jest tests (unit and integration)"
run-name: "Run on commit ${{github.sha}}"

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Run jest tests on all packages
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && echo "Pg is ready" && break
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
          pg_isready -h localhost -p 5432 || { echo "PostgreSQL failed to start"; exit 1; }

      - name: Run tests
        env:
          TEST_DB_HOST: "localhost"
        run: pnpm turbo:test
