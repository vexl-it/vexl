packages:
  - "packages/*"
  - "apps/*"
  - "tooling/*"

nodeLinker: hoisted
linkWorkspacePackages: true
preferWorkspacePackages: true
preferSymlinkedExecutables: false
strictPeerDependencies: false

overrides:
  "@bam.tech/react-native-image-resizer@^3.0.5": "3.0.11"
  "crypto-browserify@^3.12.1": "3.12.1"
  "ioredis": "5.11.1"
  "jotai@^2.15.0": "2.15.0"
  "msgpackr@^1.11.2": "1.11.2"
  "react-native-draggable@3.3.0": "3.3.0"
  "readable-stream@~2.3.6": "2.3.8"
  "readable-stream@^2.3.8": "2.3.8"
  "redlock@^5.0.0-beta.2": "5.0.0-beta2"

patchedDependencies:
  "@bam.tech/react-native-image-resizer@3.0.11": "patches/@bam.tech-react-native-image-resizer-npm-3.0.11-33fd6eed5e.patch"
  crypto-browserify@3.12.1: patches/crypto-browserify@3.12.1.patch
  "jotai@2.15.0": "patches/jotai-npm-2.15.0-960bc8cd61.patch"
  "msgpackr@1.11.2": "patches/msgpackr-npm-1.11.2-a21c5db6f8.patch"
  "react-native-draggable@3.3.0": "patches/react-native-draggable-npm-3.3.0-af52e9b617.patch"
  "readable-stream@2.3.8": "patches/readable-stream-npm-2.3.8-67a94c2cb1.patch"
  "redlock@5.0.0-beta2": "patches/redlock-npm-5.0.0-beta2-4d0e335fe9.patch"

allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "esbuild": true
  "msgpackr-extract": true
  "protobufjs": true
  "react-native-libsodium": true
  "sharp": true

minimumReleaseAgeExclude:
  - react-native-worklets@0.10.2
